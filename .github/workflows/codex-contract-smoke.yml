name: Codex CLI contract smoke

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - shared/codex-compatibility.json
      - scripts/smoke-codex-cli.mjs
      - .github/workflows/codex-contract-smoke.yml
  schedule:
    - cron: '17 06 * * 1'

concurrency:
  group: codex-contract-smoke
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  contract:
    environment: codex-contract-smoke
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run smoke:codex
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: codex-contract-smoke-${{ github.run_id }}
          path: test-results/codex-contract-smoke.json
          if-no-files-found: error
          retention-days: 30
