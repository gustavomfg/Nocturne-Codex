name: Package validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - electron/**
      - src/**
      - shared/**
      - scripts/smoke-package.mjs
      - electron-builder.json5
      - package.json
      - package-lock.json
      - .github/workflows/package-validation.yml
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  package:
    name: Package and smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run package -- --publish never
      - name: Smoke test packaged application (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run smoke:package
      - name: Smoke test packaged application
        if: runner.os != 'Linux'
        run: npm run smoke:package
      - run: npm run checksums
      - uses: actions/upload-artifact@v7
        with:
          name: nocturne-${{ runner.os }}-${{ runner.arch }}
          path: |
            release/*/*.AppImage
            release/*/*.tar.gz
            release/*/*.dmg
            release/*/*.exe
            release/*/*.zip
            release/*/SHA256SUMS
          if-no-files-found: error
