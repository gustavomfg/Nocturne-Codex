name: Package validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - electron/**
      - src/**
      - shared/**
      - scripts/smoke-package.mjs
      - electron-builder.json5
      - package.json
      - package-lock.json
      - .nvmrc
      - playwright.config.ts
      - tests/renderer/**
      - .github/workflows/package-validation.yml
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  workflow-lint:
    name: Validate GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint 1.7.12
        shell: bash
        run: |
          archive=actionlint_1.7.12_linux_amd64.tar.gz
          base=https://github.com/rhysd/actionlint/releases/download/v1.7.12
          curl --fail --location --silent --show-error --output "/tmp/$archive" "$base/$archive"
          curl --fail --location --silent --show-error --output /tmp/actionlint-checksums.txt "$base/actionlint_1.7.12_checksums.txt"
          grep "  $archive$" /tmp/actionlint-checksums.txt > /tmp/actionlint.sha256
          cd /tmp
          sha256sum --check actionlint.sha256
          tar -xzf "$archive" actionlint
          cd "$GITHUB_WORKSPACE"
          /tmp/actionlint

  verify:
    name: Verify source (Node ${{ matrix.node }})
    needs: workflow-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['24.18.0', '24']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run verify:release-metadata

  renderer:
    name: Renderer interaction and visual regression
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:renderer
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: renderer-regression-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  package:
    name: Package and smoke (${{ matrix.os }})
    needs: [verify, renderer]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Validation jobs build artifacts only. GitHub Releases are published explicitly
      # after every platform has passed, so tag builds must not auto-publish here.
      - run: npm run package -- --publish never
      - name: Smoke test packaged application (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run smoke:package
      - name: Smoke test packaged application
        if: runner.os != 'Linux'
        run: npm run smoke:package
      - run: npm run checksums
      - uses: actions/upload-artifact@v7
        with:
          name: nocturne-${{ runner.os }}-${{ runner.arch }}
          path: |
            release/*/*.AppImage
            release/*/*.tar.gz
            release/*/*.dmg
            release/*/*.exe
            release/*/*.zip
            release/*/*.blockmap
            release/*/*.yml
            release/*/SHA256SUMS
          if-no-files-found: error
