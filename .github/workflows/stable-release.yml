name: Stable signed artifacts

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing stable tag to build and publish (for example v1.0.0)
        required: true
        type: string

permissions:
  contents: read

jobs:
  signed-package:
    name: Sign and verify (${{ matrix.os }})
    environment: stable-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.MAC_CSC_LINK || '' }}
      CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
      APPLE_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID || '' }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
      APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
      WIN_CSC_LINK: ${{ matrix.os == 'windows-latest' && secrets.WIN_CSC_LINK || '' }}
      WIN_CSC_KEY_PASSWORD: ${{ matrix.os == 'windows-latest' && secrets.WIN_CSC_KEY_PASSWORD || '' }}
      GPG_PRIVATE_KEY: ${{ matrix.os == 'ubuntu-latest' && secrets.GPG_PRIVATE_KEY || '' }}
      GPG_PASSPHRASE: ${{ matrix.os == 'ubuntu-latest' && secrets.GPG_PASSPHRASE || '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Require a stable version
        shell: bash
        run: |
          node -e "const v=require('./package.json').version;const tag=process.env.RELEASE_TAG;if(v.includes('-'))throw new Error('Stable signing requires a version without a prerelease suffix: '+v);if(tag !== 'v'+v)throw new Error('Tag '+tag+' does not match package version v'+v)"
      - run: npm ci
      - name: Import Linux release key
        if: runner.os == 'Linux'
        shell: bash
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import
      - run: npm run package -- --publish never
      - run: npm run checksums
      - name: Sign Linux checksums
        if: runner.os == 'Linux'
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --detach-sign --output "release/$version/SHA256SUMS.sig" "release/$version/SHA256SUMS"
      - run: npm run verify:signatures
      - name: Preserve platform checksum manifest
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          mv "release/$version/SHA256SUMS" "release/$version/SHA256SUMS-${{ runner.os }}"
          if [ -f "release/$version/SHA256SUMS.sig" ]; then mv "release/$version/SHA256SUMS.sig" "release/$version/SHA256SUMS-${{ runner.os }}.sig"; fi
      - uses: actions/upload-artifact@v7
        with:
          name: nocturne-signed-${{ runner.os }}-${{ runner.arch }}
          path: |
            release/*/*.AppImage
            release/*/*.tar.gz
            release/*/*.dmg
            release/*/*.exe
            release/*/*.zip
            release/*/*.blockmap
            release/*/*.yml
            release/*/SHA256SUMS-*
          if-no-files-found: error

  stable-gate:
    name: Verify and publish stable release
    needs: signed-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}
      - uses: actions/download-artifact@v8
        with:
          pattern: nocturne-signed-*
          path: release-assets
          merge-multiple: true
      - run: npm run verify:release-assets -- release-assets
      - name: Publish verified assets
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* --verify-tag --generate-notes --title "Nocturne Codex $RELEASE_TAG"
          fi
