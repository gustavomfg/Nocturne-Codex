name: Bug report
description: Relate um comportamento reproduzível
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes: { value: "Remova tokens, paths privados e conteúdo sensível dos logs." }
  - type: input
    id: version
    attributes: { label: Versão, placeholder: "0.5.0-beta" }
    validations: { required: true }
  - type: input
    id: platform
    attributes: { label: Sistema e versão do Codex CLI }
    validations: { required: true }
  - type: textarea
    id: steps
    attributes: { label: Passos para reproduzir }
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: Resultado esperado }
  - type: textarea
    id: logs
    attributes: { label: Logs sanitizados }
